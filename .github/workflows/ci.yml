name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install
        env:
          ASTRO_TELEMETRY_DISABLED: "1"
        run: npm ci

      - name: Build Astro site
        env:
          ASTRO_TELEMETRY_DISABLED: "1"
        run: npm run build
